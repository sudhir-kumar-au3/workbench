<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1230"/>
      <stop offset="100%" stop-color="#161a3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#8a99ff"/>
      <stop offset="55%" stop-color="#5a7bff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5a7bff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5a7bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="198" ry="198" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- soft glow behind the mark -->
  <circle cx="512" cy="520" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <!-- subtle hex frame: keeps the geometric flavor of the reference but stays in the background -->
  <polygon points="512,152 824,332 824,692 512,872 200,692 200,332"
           fill="none"
           stroke="rgba(138,153,255,0.18)"
           stroke-width="8"
           stroke-linejoin="round"/>

  <!-- branching mark: source node up top, trunk descending, three roots fanning to worktree nodes -->
  <g stroke="url(#accent)" stroke-width="56" stroke-linecap="round" fill="none">
    <!-- trunk -->
    <path d="M 512 305 L 512 540"/>
    <!-- left root -->
    <path d="M 512 540 C 512 670, 270 670, 270 740"/>
    <!-- center root -->
    <path d="M 512 540 L 512 740"/>
    <!-- right root -->
    <path d="M 512 540 C 512 670, 754 670, 754 740"/>
  </g>

  <!-- nodes -->
  <g fill="url(#accent)">
    <circle cx="512" cy="305" r="64"/>
    <circle cx="270" cy="740" r="50"/>
    <circle cx="512" cy="740" r="50"/>
    <circle cx="754" cy="740" r="50"/>
  </g>

  <!-- specular highlights for depth -->
  <g fill="rgba(255,255,255,0.55)">
    <circle cx="494" cy="285" r="14"/>
    <circle cx="258" cy="725" r="11"/>
    <circle cx="500" cy="725" r="11"/>
    <circle cx="742" cy="725" r="11"/>
  </g>
</svg>
